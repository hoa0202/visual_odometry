/**:
  ros__parameters:
    # Input Source Settings
    input:
      source: "zed_sdk"  # "ros2" 또는 "zed_sdk"
      zed:
        serial_number: 31667076 #35847285
        resolution: "HD720"  # HD2K, HD1080, HD720
        fps: 60
        depth_mode: "NEURAL_LIGHT"  # PERFORMANCE, QUALITY, ULTRA
        
    # Topic Settings (ROS2 source 사용시)
    topics:
      rgb_image: "/zed/zed_node/rgb/color/rect/image"
      depth_image: "/zed/zed_node/depth/depth_registered"
      camera_info: "/zed/zed_node/rgb/color/rect/camera_info"
      feature_image: "feature_image"  # 발행할 토픽
      imu: "imu"  # IMU 발행 토픽 (zed_sdk 모드, ZED2/ZED Mini만)
      imu_sub: "/zed/zed_node/imu/data"  # IMU 구독 (ros2 모드, fusion 시)
      
    # Processing Parameters (연산 활성화 여부)
    processing:
      enable_feature_detection: true   # 특징점 검출 활성화
      enable_feature_matching: true    # 특징점 매칭 활성화
      enable_pose_estimation: true     # 포즈 추정 활성화
      publish_results: true            # 결과 토픽 발행 활성화

    # IMU (zed_sdk 모드, ZED2/ZED Mini만)
    imu:
      enable: false  # IMU 발행 활성화
      fusion_mode: "factor_graph"  # "none" | "complementary" | "ekf" | "factor_graph"
      complementary_alpha: 0.98  # complementary filter: gyro trust (0.95~0.99)
      factor_graph_window_size: 20  # sliding window (0=무제한)
      ekf:
        chi2_threshold: 16.8   # χ²(6, 0.99), innovation gate
        huber_pos_m: 0.1        # position innovation clip (m)
        huber_rot_rad: 0.1      # rotation innovation clip (rad)

    # Frame IDs: odom→camera_link (body), camera_link→camera_optical_frame (static)
    frames:
      frame_id: "odom"
      child_frame_id: "camera_link"
    tf:
      publish: true                    # TF 발행 여부

    # Feature Detector Parameters (연산 파라미터)
    feature_detector:
      max_features: 1000              # 최대 특징점 개수 "1000개 고정으로 수정 금지"
      scale_factor: 1.2             # 스케일 팩터
      n_levels: 8                   # 피라미드 레벨 수
      fast_threshold: 25            # FAST 임계값
      image_scale: 0.2              # 이미지 스케일
      min_distance: 15              # 특징점 간 최소 거리
      quality_level: 0.01           # 특징점 품질 레벨 (0.001-0.1)
      matching:
        ratio_threshold: 0.8        # 매칭 비율 임계값
        cross_check: false          # 교차 검사 사용 여부
        max_distance: 50            # 매칭점 간 최대 거리 (픽셀)
        min_matches: 10             # 최소 매칭 개수
        ransac:
          threshold: 3.0            # RANSAC 임계값 (픽셀)
          confidence: 0.99          # RANSAC 신뢰도 (0.9-0.99)
          max_iterations: 1000      # 최대 반복 횟수

    # Visualization Parameters (시각화 설정)
    visualization:
      enable: true                  # 전체 시각화 활성화/비활성화
      window_width: 800             # 윈도우 너비 (400-1920)
      window_height: 600            # 윈도우 높이 (300-1080)
      window_pos_x: 100             # 윈도우 X 위치 (0-1920)
      window_pos_y: 100             # 윈도우 Y 위치 (0-1080)
      fps_window_size: 60           # FPS 계산 윈도우 크기 (30-120)
      feature_size: 3               # 특징점 크기 (1-10)
      line_thickness: 2             # 선 두께 (1-5)
      windows:
        show_original: true         # 원본 이미지 윈도우
        show_features: true         # 특징점 윈도우
        show_matches: true          # 매칭 윈도우
      window_names:
        original: "Original Image"
        features: "Feature Detection"
        matches: "Feature Matches"

    # Image Processor Parameters
    image_processor:
      gaussian_blur_size: 0
      gaussian_sigma: 1.0
      enable_histogram_eq: false

    # Camera Parameters (기본값, 실제로는 카메라 info에서 업데이트됨)
    camera:
      fx: 525.0
      fy: 525.0
      cx: 319.5
      cy: 239.5
      width: 640
      height: 480

    # Visual Odometry Parameters (legacy)
    vo:
      min_feature_distance: 30.0
      max_feature_distance: 5000.0
      min_matches: 10
      ransac_threshold: 3.0
      keyframe_rotation_threshold: 0.1
      keyframe_translation_threshold: 0.1
      zero_motion_threshold_mm: 2.0
      zero_motion_rotation_threshold_rad: 0.002

    # ─── RTAB-Map Style VIO Parameters ───────────────────────────────────
    vio:
      init_mode: "full"                  # "full" | "simple" | "none"
      use_imu: true                      # IMU preintegration (front-end prediction only)
      graph_window_size: 50              # Working Memory max size
      lost_timeout_sec: 5.0              # RECENTLY_LOST → LOST timeout
      vocabulary_path: ""                # DBoW2 ORB vocab (empty = auto-detect)
      loop_closure:
        enable: true                     # Bayesian loop closure detection
        min_matches: 30                  # geometric verification min matches
        min_score: 0.3                   # BoW similarity floor
        min_interval_keyframes: 10       # min KF gap to consider loop
        bayesian_threshold: 0.55         # P(loop|obs) acceptance threshold
        temporal_consistency: 3          # consecutive wins before accept
      memory:
        stm_size: 10                     # Short-Term Memory max nodes
        rehearsal_similarity: 0.8        # BoW similarity for node merge
        proximity_max_dist: 0.5          # meters, proximity link threshold
      imu_noise:                         # ZED2i BMI088 defaults
        accel_sigma: 0.05               # m/s²/√Hz
        gyro_sigma: 0.005               # rad/s/√Hz
        accel_bias_rw: 0.0005           # m/s³/√Hz
        gyro_bias_rw: 0.00005           # rad/s²/√Hz